# ─── HOW TO ADD YOUR OWN DEVICE ───
#
# 1. Uncomment one of the examples above (or copy it)
# 2. Change the id, name, connection details
# 3. Define capabilities (what it can do)
# 4. Define command_map (how capabilities map to actual commands)
# 5. Restart Leo — the device appears as tools automatically
#
# That's it. Leo can now control your device by voice.
#
# ─── LONG-RANGE / REMOTE DEVICES ───
#
# For devices beyond WiFi/Bluetooth range (across the city, country, or world),
# use the "tunnel" protocol. This routes any protocol through a VPN:
#
# Prerequisites:
#   - WireGuard, Tailscale, or ZeroTier VPN running on both Home Base and remote device
#   - Remote device has 4G/LTE SIM or any internet connection
#   - VPN assigns a fixed IP to the remote device (e.g. 10.0.0.50)
#
# Example: Drone on a remote property (connected via 4G + WireGuard)
#
#   - id: "remote_drone"
#     name: "Remote Property Drone"
#     type: "drone"
#     location: "remote_property"
#     protocol: "tunnel"
#     connection:
#       vpn_ip: "10.0.0.50"          # Fixed VPN IP of the remote device
#       port: 8080                     # Port on the remote device
#       inner_protocol: "http"         # What runs on the remote end
#       inner_connection:
#         health_endpoint: "health"
#     capabilities:
#       - name: "takeoff"
#         description: "Launch drone at remote property"
#         requires_confirmation: true
#       - name: "patrol"
#         description: "Patrol the remote property perimeter"
#       - name: "get_camera"
#         description: "Get live camera snapshot from the drone"
#         category: "query"
#
# Example: Car tracker (Raspberry Pi with 4G + GPS)
#
#   - id: "car_tracker"
#     name: "Car GPS Tracker"
#     type: "tracker"
#     location: "car"
#     protocol: "tunnel"
#     connection:
#       vpn_ip: "10.0.0.60"
#       port: 5000
#       inner_protocol: "http"
#     capabilities:
#       - name: "get_location"
#         description: "Get current GPS coordinates of the car"
#         category: "query"
#       - name: "get_speed"
#         description: "Current speed from GPS"
#         category: "query"
#       - name: "get_history"
#         description: "Get route history for today"
#         category: "query"
#
# The VPN makes distance invisible to Leo. A device in another country
# looks the same as one in the next room. All traffic is encrypted.
#
# For custom hardware (Arduino/ESP32), flash a sketch that:
#   - Reads serial commands like "PANTILT 90 45" or "RELAY 0 1"
#   - Sends back "OK" or status data
#   - See docs/device_development.md for Arduino sketch templates
