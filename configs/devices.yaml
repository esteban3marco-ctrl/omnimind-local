# OMNIMIND LOCAL — Universal Device Configuration
# ══════════════════════════════════════════════════
#
# Any device can be connected to Leo by defining:
#   1. id: unique identifier
#   2. protocol: how to talk to it (serial, mqtt, http, udp, ble, websocket)
#   3. connection: protocol-specific connection details
#   4. capabilities: what it can do (becomes LLM tools automatically)
#   5. command_map: maps capability names to actual device commands
#
# Leo doesn't need to know HOW a device works.
# He only needs to know WHAT it can do.
#
# Supported protocols:
#   serial    — Arduino, ESP32, robotic arms, relay boards (USB)
#   mqtt      — Home Assistant, IoT sensors, smart home (WiFi)
#   http      — REST APIs, local services, SDKs with HTTP interface
#   udp       — Drones (Tello), custom protocols
#   ble       — Wearables, OBD-II adapters, sensors (Bluetooth)
#   websocket — Real-time services, custom bridges

