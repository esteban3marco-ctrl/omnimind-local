<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#8b9dc3" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#8b9dc3" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#8b9dc3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="55%" cy="45%" r="25%">
      <stop offset="0%" stop-color="#8ec5c0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8ec5c0" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="#06060c"/>
  
  <!-- Ambient glows -->
  <rect width="1280" height="640" fill="url(#glow1)"/>
  <rect width="1280" height="640" fill="url(#glow2)"/>
  
  <!-- Vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#06060c" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="1280" height="640" fill="url(#vig)"/>
  
  <!-- Particle field (central blob) -->
  <g filter="url(#blur)" opacity="0.5">
    <!-- Inner dense particles -->
    <circle cx="640" cy="295" r="2.0" fill="#a0b4d4" opacity="0.6"/>
    <circle cx="628" cy="288" r="1.5" fill="#8b9dc3" opacity="0.5"/>
    <circle cx="652" cy="282" r="1.8" fill="#8ec5c0" opacity="0.55"/>
    <circle cx="635" cy="305" r="1.3" fill="#c4a6d4" opacity="0.45"/>
    <circle cx="648" cy="300" r="2.2" fill="#a0b4d4" opacity="0.65"/>
    <circle cx="620" cy="298" r="1.6" fill="#8b9dc3" opacity="0.5"/>
    <circle cx="660" cy="290" r="1.4" fill="#8ec5c0" opacity="0.4"/>
    <circle cx="630" cy="275" r="1.7" fill="#b0c4de" opacity="0.5"/>
    <circle cx="655" cy="310" r="1.9" fill="#c4a6d4" opacity="0.55"/>
    <circle cx="615" cy="285" r="1.2" fill="#a0b4d4" opacity="0.4"/>
    <circle cx="670" cy="295" r="1.5" fill="#8b9dc3" opacity="0.45"/>
    <circle cx="625" cy="312" r="1.8" fill="#8ec5c0" opacity="0.5"/>
    <circle cx="645" cy="270" r="1.3" fill="#b0c4de" opacity="0.4"/>
    <circle cx="610" cy="300" r="2.0" fill="#c4a6d4" opacity="0.5"/>
    <circle cx="665" cy="278" r="1.6" fill="#a0b4d4" opacity="0.45"/>
  </g>
  
  <!-- Mid-range particles -->
  <g opacity="0.4">
    <circle cx="590" cy="270" r="1.3" fill="#8b9dc3" opacity="0.35"/>
    <circle cx="690" cy="265" r="1.1" fill="#8ec5c0" opacity="0.3"/>
    <circle cx="575" cy="310" r="1.5" fill="#c4a6d4" opacity="0.35"/>
    <circle cx="705" cy="305" r="1.2" fill="#a0b4d4" opacity="0.3"/>
    <circle cx="600" cy="330" r="1.0" fill="#b0c4de" opacity="0.25"/>
    <circle cx="680" cy="260" r="1.4" fill="#8b9dc3" opacity="0.3"/>
    <circle cx="560" cy="290" r="1.1" fill="#8ec5c0" opacity="0.25"/>
    <circle cx="720" cy="285" r="1.3" fill="#c4a6d4" opacity="0.3"/>
    <circle cx="585" cy="250" r="0.9" fill="#a0b4d4" opacity="0.2"/>
    <circle cx="695" cy="320" r="1.2" fill="#b0c4de" opacity="0.25"/>
    <circle cx="550" cy="300" r="1.0" fill="#8b9dc3" opacity="0.2"/>
    <circle cx="730" cy="275" r="0.8" fill="#8ec5c0" opacity="0.2"/>
    <circle cx="605" cy="340" r="1.1" fill="#c4a6d4" opacity="0.25"/>
    <circle cx="675" cy="250" r="0.9" fill="#a0b4d4" opacity="0.2"/>
  </g>
  
  <!-- Outer sparse particles -->
  <g opacity="0.25">
    <circle cx="520" cy="280" r="0.8" fill="#8b9dc3" opacity="0.2"/>
    <circle cx="760" cy="270" r="0.7" fill="#8ec5c0" opacity="0.15"/>
    <circle cx="530" cy="320" r="0.9" fill="#c4a6d4" opacity="0.2"/>
    <circle cx="750" cy="310" r="0.8" fill="#a0b4d4" opacity="0.18"/>
    <circle cx="500" cy="295" r="0.6" fill="#b0c4de" opacity="0.12"/>
    <circle cx="780" cy="290" r="0.7" fill="#8b9dc3" opacity="0.15"/>
    <circle cx="540" cy="255" r="0.8" fill="#8ec5c0" opacity="0.15"/>
    <circle cx="740" cy="335" r="0.6" fill="#c4a6d4" opacity="0.12"/>
  </g>
  
  <!-- Connection lines (subtle) -->
  <g stroke="#8b9dc3" stroke-width="0.3" opacity="0.08">
    <line x1="640" y1="295" x2="628" y2="288"/>
    <line x1="640" y1="295" x2="652" y2="282"/>
    <line x1="648" y1="300" x2="660" y2="290"/>
    <line x1="635" y1="305" x2="625" y2="312"/>
    <line x1="628" y1="288" x2="615" y2="285"/>
    <line x1="652" y1="282" x2="665" y2="278"/>
    <line x1="620" y1="298" x2="610" y2="300"/>
    <line x1="670" y1="295" x2="690" y2="265"/>
    <line x1="630" y1="275" x2="645" y2="270"/>
    <line x1="655" y1="310" x2="695" y2="320"/>
  </g>
  
  <!-- Center glow (behind text) -->
  <radialGradient id="centerGlow" cx="50%" cy="42%" r="15%">
    <stop offset="0%" stop-color="#8b9dc3" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#8b9dc3" stop-opacity="0"/>
  </radialGradient>
  <rect width="1280" height="640" fill="url(#centerGlow)"/>
  
  <!-- Top label -->
  <text x="640" y="180" text-anchor="middle" fill="#ffffff" fill-opacity="0.25" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="12" letter-spacing="4" font-weight="300">OMNIMIND LOCAL</text>
  
  <!-- Leo name -->
  <text x="640" y="300" text-anchor="middle" fill="#ffffff" fill-opacity="0.82" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="80" font-weight="300" letter-spacing="4" filter="url(#glow)">Leo</text>
  
  <!-- Tagline -->
  <text x="640" y="350" text-anchor="middle" fill="#ffffff" fill-opacity="0.3" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="16" font-weight="300" letter-spacing="1">Your private cognitive AI · 100% offline · Learns and evolves</text>
  
  <!-- Bottom badges -->
  <text x="640" y="480" text-anchor="middle" fill="#8b9dc3" fill-opacity="0.3" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="10" letter-spacing="3" font-weight="300">PRIVATE · LOCAL · OFFLINE · INTELLIGENT · EVOLVING</text>
  
  <!-- Codename -->
  <text x="640" y="510" text-anchor="middle" fill="#ffffff" fill-opacity="0.12" font-family="'DM Sans', 'Helvetica Neue', sans-serif" font-size="9" letter-spacing="5" font-weight="300">CODENAME: PROMETHEUS</text>
</svg>
